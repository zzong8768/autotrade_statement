<script type="text/babel">
const { useState, useRef, useEffect } = React;

/* ══════════════════════════════════════════
   IndexedDB helpers (도장 전용)
══════════════════════════════════════════ */
async function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open('zytn_v1', 1);
    r.onupgradeneeded = e => e.target.result.createObjectStore('kv');
    r.onsuccess  = e => res(e.target.result);
    r.onerror    = () => rej(r.error);
  });
}
async function idbSet(key, val) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction('kv', 'readwrite');
    tx.objectStore('kv').put(val, key);
    tx.oncomplete = res;
    tx.onerror    = () => rej(tx.error);
  });
}
async function idbGet(key) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction('kv', 'readonly');
    const r  = tx.objectStore('kv').get(key);
    r.onsuccess = () => res(r.result ?? null);
    r.onerror   = () => rej(r.error);
  });
}

const OB  = '2px solid #1a1a1a';

/* ══════════════════════════════════════════

══════════════════════════════════════════ */
function ShareModal({ onClose }) {
  const [preview,  setPreview]  = useState(null);
  const [busy,     setBusy]     = useState(false);
  const [statusMsg, setStatus]  = useState({ text:'', type:'' });
  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

  /* 미리보기 생성 */
  useEffect(() => {
    const el = document.getElementById('inv-doc');
    if (!el || typeof html2canvas === 'undefined') return;
    html2canvas(el, {
      scale: 0.5,
      backgroundColor: '#ffffff',
      logging: false,
      useCORS: true,
      width: el.scrollWidth,
      height: el.scrollHeight,
      windowWidth: el.scrollWidth + 40,
      scrollX: 0, scrollY: 0,
    })
      .then(c => setPreview(c.toDataURL('image/jpeg', 0.7)))
      .catch(() => {});
  }, []);

  async function capture(scale = 2) {
    const el = document.getElementById('inv-doc');
    if (!el) throw new Error('요소 없음');

    /* ── 부모 overflow 임시 해제 → 모바일 잘림 방지 ── */
    const wrap = el.closest('.inv-wrap') || el.parentElement;
    const prevOverflow = wrap ? wrap.style.overflow : '';
    const prevMaxW     = wrap ? wrap.style.maxWidth  : '';
    if (wrap) { wrap.style.overflow = 'visible'; wrap.style.maxWidth = 'none'; }

    const fullW = el.scrollWidth;
    const fullH = el.scrollHeight;

    let raw;
    try {
      raw = await html2canvas(el, {
        scale,
        backgroundColor: '#ffffff',
        useCORS:     true,
        logging:     false,
        width:       fullW,
        height:      fullH,
        windowWidth: Math.max(fullW + 40, 1400),
        scrollX:     0,
        scrollY:     0,
      });
    } finally {
      /* 반드시 원복 */
      if (wrap) { wrap.style.overflow = prevOverflow; wrap.style.maxWidth = prevMaxW; }
    }

    /* ── 여백(20px) 추가 ── */
    const pad = Math.round(20 * scale);
    const out = document.createElement('canvas');
    out.width  = raw.width  + pad * 2;
    out.height = raw.height + pad * 2;
    const ctx = out.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, out.width, out.height);
    ctx.drawImage(raw, pad, pad);
    return out;
  }

  function toast(text, type = 'ok') {
    setStatus({ text, type });
    setTimeout(() => setStatus({ text:'', type:'' }), 3000);
  }

  async function savePNG() {
    setBusy(true);
    try {
      const canvas = await capture(2);
      const link = document.createElement('a');
      const today = new Date().toLocaleDateString('ko-KR').replace(/\. /g,'-').replace('.','');
      link.download = `거래명세서_${today}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
      toast('✅ PNG 저장 완료');
    } catch { toast('❌ 저장 실패', 'err'); }
    setBusy(false);
  }

  async function copyClipboard() {
    setBusy(true);
    try {
      const canvas = await capture(2);
      /* ClipboardItem 미지원(모바일) 체크 */
      if (typeof ClipboardItem === 'undefined' || !navigator.clipboard?.write) {
        /* 폴백: 자동 PNG 저장 */
        const link = document.createElement('a');
        const today = new Date().toLocaleDateString('ko-KR').replace(/\. /g,'-').replace('.','');
        link.download = `거래명세서_${today}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        toast('📱 모바일은 PNG 저장됨 — 카톡 파일 전송으로 공유하세요');
      } else {
        await new Promise((res, rej) => {
          canvas.toBlob(async blob => {
            try {
              await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
              res();
            } catch(e) { rej(e); }
          }, 'image/png');
        });
        toast('✅ 클립보드에 복사됨 — 카톡/메일에 붙여넣기 하세요');
      }
    } catch { toast('❌ 복사 실패 — PNG 저장 버튼을 이용하세요', 'err'); }
    setBusy(false);
  }

  function openEmail() {
    window.location.href = 'mailto:?subject=거래명세서&body=안녕하세요%2C%20거래명세서를%20보내드립니다.';
  }

  /* 텔레그램 Bot API — PNG 파일 직접 전송 */
  async function sendTelegram() {
    if (!CONFIG.tgToken || !CONFIG.tgChatId) {
      toast('❌ CONFIG에 tgToken / tgChatId를 입력하세요', 'err'); return;
    }
    setBusy(true);
    try {
      const canvas = await capture(2);
      canvas.toBlob(async blob => {
        try {
          const fd = new FormData();
          fd.append('chat_id', CONFIG.tgChatId);
          fd.append('photo', blob, '거래명세서.png');
          const res  = await fetch(`https://api.telegram.org/bot${CONFIG.tgToken}/sendPhoto`, { method:'POST', body:fd });
          const data = await res.json();
          if (data.ok) toast('✅ 텔레그램 전송 완료');
          else toast(`❌ 전송 실패: ${data.description}`, 'err');
        } catch { toast('❌ 텔레그램 전송 실패 (네트워크 오류)', 'err'); }
        setBusy(false);
      }, 'image/png');
    } catch { setBusy(false); toast('❌ 이미지 생성 실패', 'err'); }
  }

  /* 카카오 오픈채팅방 — 이미지 클립보드 복사 후 채팅방 오픈 */
  async function shareKakao() {
    if (!CONFIG.kakaoUrl) {
      toast('❌ CONFIG에 kakaoUrl을 입력하세요', 'err'); return;
    }
    setBusy(true);
    try {
      const canvas = await capture(2);
      canvas.toBlob(async blob => {
        try {
          /* 1) 클립보드에 이미지 복사 */
          await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
          /* 2) 오픈채팅방 열기 */
          window.open(CONFIG.kakaoUrl, '_blank');
          toast('✅ 이미지 복사됨 → 채팅방에서 Ctrl+V / 붙여넣기');
        } catch {
          /* 클립보드 실패 시 채팅방만 열기 */
          window.open(CONFIG.kakaoUrl, '_blank');
          toast('⚠️ 클립보드 복사 실패 — PNG 저장 후 직접 첨부하세요', 'err');
        }
        setBusy(false);
      }, 'image/png');
    } catch { setBusy(false); toast('❌ 이미지 생성 실패', 'err'); }
  }

  return (
    <div className="share-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="share-box">

        {/* 헤더 */}
        <div className="share-head">
          <span className="share-head-title">🏷️ 발주서 공유</span>
          <button className="share-head-close" onClick={onClose}>✕</button>
        </div>

        {/* 미리보기 */}
        <div className="share-preview">
          {preview
            ? <img src={preview} alt="미리보기" />
            : <span className="share-preview-placeholder">미리보기 생성 중…</span>
          }
        </div>

        {/* 버튼 */}
        <div className="share-btns">
          <button className="shr-btn shr-png" onClick={savePNG} disabled={busy}>
            📷 PNG 저장
          </button>
          <button className="shr-btn shr-clip" onClick={copyClipboard} disabled={busy}>
            📋 클립보드 복사 → 카톡/메일에 붙여넣기
          </button>
          <div className="shr-row">
            <button className="shr-btn shr-email" onClick={openEmail}    disabled={busy}>📧 이메일</button>
            <button className="shr-btn shr-tg"    onClick={sendTelegram} disabled={busy}>✈️ 텔레그램 전송</button>
          </div>
          {isMobile && (
            <button className="shr-btn shr-kakao" onClick={shareKakao} disabled={busy}>
              💬 카카오톡 (오픈채팅방)
            </button>
          )}
        </div>

        {/* 상태 메시지 */}
        <p className={`shr-status ${statusMsg.type}`}>{statusMsg.text}</p>

        {/* 팁 */}
        <p className="share-tip">
          💡 클립보드 복사 후 카카오톡/메일에 Ctrl+V 붙여넣기
        </p>

        <button className="share-close-btn" onClick={onClose}>닫기</button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   Control Panel
══════════════════════════════════════════ */
function ControlPanel({
  items, setItems, catalog, setCatalog, date, setDate,
  onSupplierClick, onCustomerClick, onStampClick, onJsonClick
}) {
  const [form, setForm]     = useState({ name:'', unit:'', quantity:'', price:'', vatIncluded:'false' });
  const [selectedId, setSel] = useState('');
  const sf = (k, v) => setForm(p => ({ ...p, [k]: v }));

  function handleCatalogSelect(e) {
    const v = e.target.value;
    setSel(v);
    if (v === '__new__') { setForm(p => ({ ...p, name:'', unit:'', price:'', vatIncluded:'false' })); return; }
    const found = catalog.find(c => String(c.id) === v);
    if (found) setForm(p => ({ ...p, name: found.name, unit: found.unit||'', price: String(found.price), vatIncluded: String(found.vatIncluded) }));
  }

  function addItem() {
    if (!form.name.trim()) return;
    setItems(prev => [...prev, {
      id: Date.now(), name: form.name.trim(), unit: form.unit.trim(),
      quantity: Number(form.quantity)||0, price: Number(form.price)||0,
      vatIncluded: form.vatIncluded === 'true'
    }]);
    setForm(p => ({ ...p, quantity: '' }));
  }

  function saveToCatalog() {
    if (!form.name.trim() || !form.price) return;
    const entry = { id: Date.now(), name: form.name.trim(), unit: form.unit.trim(), price: Number(form.price)||0, vatIncluded: form.vatIncluded === 'true' };
    const updated = [...catalog, entry];
    setCatalog(updated);
    saveLS('zytn_catalog', updated);
  }

  return (
    <div className="ctrl-panel">

      {/* ── Row 1: 날짜 + 설정 버튼 + JSON ── */}
      <div className="ctrl-section">
        <span className="ctrl-label">날 짜</span>
        <input
          type="date"
          className="field-input"
          style={{ width: 145 }}
          value={date}
          onChange={e => setDate(e.target.value)}
        />
        <div className="ctrl-divider" />
        <button className="btn btn-soft" onClick={onSupplierClick}>🏢 공급자</button>
        <button className="btn btn-soft" onClick={onCustomerClick}>👤 거래처</button>
        <button className="btn btn-soft" onClick={onStampClick}>🔖 도장</button>
        <div style={{ flex: 1 }} />
        <button className="btn btn-green" onClick={onJsonClick}>⇅ JSON 동기화</button>
      </div>

      {/* ── Row 2: 품목 입력 ── */}
      <div className="ctrl-section">
        <span className="ctrl-label">품 목</span>
        <div className="item-form">
          {/* 카탈로그 선택 */}
          <div className="field-group">
            <label>품목 선택</label>
            <select className="field-select" style={{ width: 150 }} value={selectedId} onChange={handleCatalogSelect}>
              <option value="">-- 선택 --</option>
              {catalog.map(c => <option key={c.id} value={String(c.id)}>{c.name}</option>)}
              <option value="__new__">✏️ 직접 입력</option>
            </select>
          </div>

          {/* 직접 입력 시 품목명 필드 */}
          {selectedId === '__new__' && (
            <div className="field-group">
              <label>품목명</label>
              <input className="field-input" style={{ width: 120 }} value={form.name}
                onChange={e => sf('name', e.target.value)}
                onKeyDown={e => e.key === 'Enter' && addItem()}
                placeholder="품목명" />
            </div>
          )}

          <div className="field-group">
            <label>단위</label>
            <input className="field-input" style={{ width: 46 }} value={form.unit}
              onChange={e => sf('unit', e.target.value)} placeholder="EA" />
          </div>
          <div className="field-group">
            <label>수량</label>
            <input className="field-input" style={{ width: 62 }} type="number" min="0"
              value={form.quantity} onChange={e => sf('quantity', e.target.value)}
              onKeyDown={e => e.key === 'Enter' && addItem()} placeholder="0" />
          </div>
          <div className="field-group">
            <label>단가</label>
            <input className="field-input" style={{ width: 90 }} type="number" min="0"
              value={form.price} onChange={e => sf('price', e.target.value)} placeholder="0" />
          </div>
          <div className="field-group">
            <label>부가세</label>
            <select className="field-select" value={form.vatIncluded} onChange={e => sf('vatIncluded', e.target.value)}>
              <option value="false">별도(+10%)</option>
              <option value="true">포함</option>
            </select>
          </div>

          <button className="btn btn-primary" style={{ alignSelf:'flex-end', marginBottom:1 }} onClick={addItem}>+ 추가</button>

          {selectedId === '__new__' && form.name.trim() && form.price && (
            <button className="btn btn-soft" style={{ alignSelf:'flex-end', marginBottom:1 }}
              onClick={saveToCatalog} title="카탈로그에 저장">
              💾 저장
            </button>
          )}
        </div>

        <div style={{ flex: 1 }} />
        <button className="btn btn-danger"
          onClick={() => { if (confirm('품목을 모두 지울까요?')) setItems([]); }}>
          🗑️ 초기화
        </button>
      </div>

    </div>
  );
}

          <tr>
            <td colSpan={2} style={{ ...lbl, height:52 }}>상 호<br/>(법인명)</td>
            <td colSpan={5} style={val}>{supplier.name}</td>
            <td colSpan={1} style={lbl}>성 명</td>
            <td colSpan={3} style={{ ...val, padding:'3px 6px' }}>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:6 }}>
                <span>{supplier.ceo}</span>
                <div className="stamp-wrap" onClick={onStampClick} title="도장 이미지 등록/변경">
                  {stamp
                    ? <img src={stamp} alt="도장" style={{ width:50, height:50, objectFit:'contain', display:'block' }} />
                    : <div style={{ width:50, height:50, borderRadius:'50%', border:'2px solid #c41e1e', color:'#c41e1e', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', fontSize:9, fontWeight:700, lineHeight:1.3, textAlign:'center' }}>
                        <span>인</span><span>감</span>
                      </div>
                  }
                </div>
              </div>
            </td>
            <td colSpan={2} style={lbl}>상 호<br/>(법인명)</td>
            <td colSpan={5} style={val}>{customer.name}</td>
            <td colSpan={1} style={lbl}>성 명</td>
            <td colSpan={3} style={{ ...val, borderRight:OB }}>{customer.ceo}</td>
          </tr>

          {/* ══ 주소 ══ */}
          <tr>
            <td colSpan={2} style={{ ...lbl, height:52 }}>사 업 장<br/>주 소</td>
            <td colSpan={9} style={{ ...val, fontSize:10 }}>{supplier.address}</td>
            <td colSpan={2} style={lbl}>사 업 장<br/>주 소</td>
            <td colSpan={9} style={{ ...val, fontSize:10, borderRight:OB }}>{customer.address}</td>
          </tr>

          {/* ══ 업태/종목 ══ */}
          <tr>
            <td colSpan={2} style={{ ...lbl, borderBottom:SB, height:52 }}>업 태</td>
            <td colSpan={5} style={{ ...val, borderBottom:SB }}>{supplier.bizType}</td>
            <td colSpan={1} style={{ ...lbl, borderBottom:SB }}>종 목</td>
            <td colSpan={3} style={{ ...val, borderBottom:SB, fontSize:10 }}>{supplier.bizItem}</td>
            <td colSpan={2} style={{ ...lbl, borderBottom:SB }}>업 태</td>
            <td colSpan={5} style={{ ...val, borderBottom:SB }}>{customer.bizType}</td>
            <td colSpan={1} style={{ ...lbl, borderBottom:SB }}>종 목</td>
            <td colSpan={3} style={{ ...val, borderBottom:SB, borderRight:OB }}>{customer.bizItem}</td>
          </tr>

          {/* ══ 품목 헤더 ══ */}
          <tr>
            <td colSpan={CS.item}  style={{ ...hdr, borderLeft:OB }}>품 목</td>
            <td colSpan={CS.unit}  style={hdr}>단위</td>
            <td colSpan={CS.qty}   style={hdr}>수 량</td>
            <td colSpan={CS.price} style={hdr}>단 가</td>
            <td colSpan={CS.sup}   style={hdr}>공급가액</td>
            <td colSpan={CS.vat}   style={{ ...hdr, fontSize:10 }}>세 액</td>
            <td colSpan={CS.tot}   style={{ ...hdr, borderRight:OB }}>합 계</td>
          </tr>

          {/* ══ 품목 행 ══ */}
          {items.map(it => {
            const supply  = it.quantity * it.price;
            const rowVat  = it.vatIncluded ? null : Math.round(supply * 0.1);
            const rowTot  = supply + (rowVat ?? 0);
            return (
              <tr key={it.id} className="item-tr">
                <td colSpan={CS.item} style={{ ...dat, textAlign:'left', paddingLeft:8, borderLeft:OB }}>
                  <span style={{ marginRight:4 }}>{it.name}</span>
                  <button className="del-btn" onClick={() => onRemove(it.id)} title="삭제">×</button>
                </td>
                <td colSpan={CS.unit}  style={dat}>{it.unit}</td>
                <td colSpan={CS.qty}   style={dat}>{fmt(it.quantity)}</td>
                <td colSpan={CS.price} style={dat}>{fmt(it.price)}</td>
                <td colSpan={CS.sup}   style={dat}>{fmt(supply)}</td>
                <td colSpan={CS.vat}   style={{ ...vatS, fontSize:rowVat == null ? 10 : 12, color: rowVat == null ? '#888' : '#1a1a1a' }}>
                  {rowVat == null ? '포함' : fmt(rowVat)}
                </td>
                <td colSpan={CS.tot}   style={{ ...dat, borderRight:OB }}>{fmt(rowTot)}</td>
              </tr>
            );
          })}

          {/* ══ 빈 행 (최소 12행) ══ */}
          {Array.from({ length: EMPTY }).map((_, i) => (
            <tr key={`e${i}`}>
              <td colSpan={CS.item}  style={{ ...emp, borderLeft:OB }}></td>
              <td colSpan={CS.unit}  style={emp}></td>
              <td colSpan={CS.qty}   style={emp}></td>
              <td colSpan={CS.price} style={emp}></td>
              <td colSpan={CS.sup}   style={emp}></td>
              <td colSpan={CS.vat}   style={emp}></td>
              <td colSpan={CS.tot}   style={{ ...emp, borderRight:OB }}></td>
            </tr>
          ))}

          {/* ══ 합계 행 ══ */}
          <tr>
            <td colSpan={CS.item}  style={{ ...totS, textAlign:'center', letterSpacing:4, borderLeft:OB }}>합 계</td>
            <td colSpan={CS.unit}  style={totS}></td>
            <td colSpan={CS.qty}   style={totS}>{fmt(grandQty)}</td>
            <td colSpan={CS.price} style={totS}></td>
            <td colSpan={CS.sup}   style={totS}>{fmt(supplyTotal)}</td>
            <td colSpan={CS.vat}   style={{ ...totS, background:'#fef3c7' }}>{vatAmount > 0 ? fmt(vatAmount) : ''}</td>
            <td colSpan={CS.tot}   style={{ ...totS, borderRight:OB }}>{fmt(grandTotal)}</td>
          </tr>

          {/* ══ 비고 ══ */}
          <tr>
            <td colSpan={3} style={{ ...lbl, borderLeft:OB, borderTop:IB, borderBottom:IB, borderRight:IB, letterSpacing:3, padding:'6px 5px' }}>비 고</td>
            <td colSpan={21} style={{ borderLeft:IB, borderTop:IB, borderBottom:IB, borderRight:OB, padding:'5px 10px' }}>
              <input
                value={remark}
                onChange={e => onRemarkChange(e.target.value)}
                style={{ width:'100%', border:'none', outline:'none', fontFamily:'Noto Sans KR, sans-serif', fontSize:12, background:'transparent', color:'#1a1a1a' }}
              />
            </td>
          </tr>

          {/* ══ 인수자 ══ */}
          <tr style={{ height: 52 }}>
            <td colSpan={18} style={{ borderLeft:OB, borderBottom:OB, borderTop:IB, borderRight:IB }}></td>
            <td colSpan={2}  style={{ borderLeft:IB, borderBottom:OB, borderTop:IB, borderRight:IB, textAlign:'center', fontSize:12, fontWeight:600, letterSpacing:3 }}>인 수 자</td>
            <td colSpan={4}  style={{ borderLeft:IB, borderBottom:OB, borderTop:IB, borderRight:OB }}></td>
          </tr>

        </tbody>
      </table>
    </div>
  );
}

/* ══════════════════════════════════════════
   App (메인)
══════════════════════════════════════════ */
function App() {
  const [items,     setItems]     = useState(() => loadLS('zytn_items',     DEF_ITEMS));
  const [supplier,  setSupplier]  = useState(() => loadLS('zytn_supplier',  DEF_SUPPLIER));
  const [customer,  setCustomer]  = useState(() => loadLS('zytn_customer',  DEF_CUSTOMER));
  const [customers, setCustomers] = useState(() => loadLS('zytn_customers', []));
  const [catalog,   setCatalog]   = useState(() => loadLS('zytn_catalog',   DEF_CATALOG));
  const [stamp,     setStamp]     = useState(null);
  const [date,      setDate]      = useState(todayISO);
  const [remark,    setRemark]    = useState(() => loadLS('zytn_remark', '입금계좌안내 : 국민은행 282437-04-004633 주식회사 지튼'));
  const [modal,     setModal]     = useState(null); // 'supplier'|'customer'|'catalog'|'json'
  const [toast,     setToast]     = useState(null);

  const stampRef      = useRef(null);
  const importInputRef = useRef(null);

  /* 도장 → IndexedDB 우선, 없으면 localStorage 폴백 (모바일 대응) */
  useEffect(() => {
    idbGet('stamp')
      .then(v => {
        if (v) { setStamp(v); return; }
        /* IndexedDB 없으면 localStorage 시도 */
        const ls = loadLS('zytn_stamp', null);
        if (ls) setStamp(ls);
      })
      .catch(() => {
        const ls = loadLS('zytn_stamp', null);
        if (ls) setStamp(ls);
      });
  }, []);

  /* 자동 저장 (localStorage) */
  useEffect(() => { saveLS('zytn_items',     items);     }, [items]);
  useEffect(() => { saveLS('zytn_supplier',  supplier);  }, [supplier]);
  useEffect(() => { saveLS('zytn_customer',  customer);  }, [customer]);
  useEffect(() => { saveLS('zytn_customers', customers); }, [customers]);
  useEffect(() => { saveLS('zytn_catalog',   catalog);   }, [catalog]);
  useEffect(() => { saveLS('zytn_remark',    remark);    }, [remark]);

  /* JSON 가져오기 이벤트 */
  useEffect(() => {
    const input = importInputRef.current;
    if (!input) return;
    const handler = async e => {
      const file = e.target.files[0];
      if (!file) return;

      /* 트랜잭션: 파싱 실패 시 기존 데이터 유지 */
      let data;
      try {
        const text = await file.text();
        data = JSON.parse(text);
        if (!data.version || !data.catalog) throw new Error('형식 오류');
      } catch {
        showToast('❌ 가져오기 실패 — 잘못된 파일 형식 (기존 데이터 유지)');
        e.target.value = '';
        return;
      }

      const msg = [
        `공급자: ${data.supplier?.name || '없음'}`,
        `카탈로그 품목: ${data.catalog?.length ?? 0}개`,
        `거래처 목록: ${data.customers?.length ?? 0}개`,
        `현재 명세서 품목: ${data.currentItems?.length ?? 0}개`,
        `도장 이미지: ${data.stamp ? '포함' : '없음'}`,
      ].join('\n');

      if (!confirm(`다음 데이터를 가져올까요?\n\n${msg}\n\n기존 데이터는 덮어쓰입니다.`)) {
        e.target.value = '';
        return;
      }

      if (data.supplier)     setSupplier(data.supplier);
      if (data.catalog)      setCatalog(data.catalog);
      if (data.customers)    setCustomers(data.customers);
      if (data.customer)     setCustomer(data.customer);
      if (data.currentItems) setItems(data.currentItems);
      if (data.remark != null) setRemark(data.remark);
      if (data.stamp) {
        setStamp(data.stamp);
        saveLS('zytn_stamp', data.stamp);
        idbSet('stamp', data.stamp).catch(() => {});
      }

      showToast(`✅ 데이터 가져오기 완료`);
      e.target.value = '';
      setModal(null);
    };
    input.addEventListener('change', handler);
    return () => input.removeEventListener('change', handler);
  }, []);

  const showToast = msg => { setToast(msg); setTimeout(() => setToast(null), 2800); };

  /* 도장 */
  function handleStampFile(e) {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = async ev => {
      const data = ev.target.result;
      setStamp(data);
      /* IndexedDB + localStorage 동시 저장 (모바일 동기화용) */
      saveLS('zytn_stamp', data);
      try { await idbSet('stamp', data); showToast('✅ 도장이 등록되었습니다'); }
      catch  { showToast('✅ 도장이 등록되었습니다 (localStorage)'); }
    };
    r.readAsDataURL(f);
    e.target.value = '';
  }

  /* 공급자 */
  function handleSupplierSave(s) {
    setSupplier(s);
    setModal(null);
    showToast('✅ 공급자 정보가 저장되었습니다');
  }

  /* 거래처 */
  function handleCustomerApply(c) {
    setCustomer(c);
    setModal(null);
    showToast('✅ 거래처 정보가 적용되었습니다');
  }
  function handleCustomerSaveToList(c) {
    const entry = { ...c, id: Date.now() };
    setCustomers(prev => [...prev, entry]);
    showToast(`✅ '${c.name}' 거래처 목록에 저장됨`);
  }
  function handleCustomerDeleteFromList(id) {
    setCustomers(prev => prev.filter(c => c.id !== id));
  }

  /* 카탈로그 */
  function handleCatalogDelete(id) {
    setCatalog(prev => prev.filter(c => c.id !== id));
  }

  /* 품목 삭제 */
  function removeItem(id) { setItems(prev => prev.filter(it => it.id !== id)); }

  /* JSON 내보내기 */
  function handleExport() {
    const today = todayISO();
    const data = {
      version:      1,
      exportedAt:   today,
      supplier,
      catalog,
      customers,
      customer,
      currentItems: items,
      remark,
      stamp,
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `zytn_backup_${today}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('✅ JSON 파일이 내보내졌습니다');
  }

  return (
    <div className="app-wrap">

      <div className="app-header">
        <h1>자동거래명세서</h1>
        <div className="hdiv"></div>
        <span className="sub">Auto Trade Statement</span>
      </div>

      {/* 숨김 인풋 */}
      <input ref={stampRef} type="file" accept="image/*" style={{ display:'none' }} onChange={handleStampFile} />

      <ControlPanel
        items={items} setItems={setItems}
        catalog={catalog} setCatalog={setCatalog}
        date={date} setDate={setDate}
        onSupplierClick={() => setModal('supplier')}
        onCustomerClick={() => setModal('customer')}
        onStampClick={() => stampRef.current?.click()}
        onJsonClick={() => setModal('json')}
      />

      <div className="inv-wrap">
        <InvoiceDoc
          items={items} date={date}
          supplier={supplier} customer={customer}
          stamp={stamp}
          remark={remark} onRemarkChange={setRemark}
          onRemove={removeItem}
          onStampClick={() => stampRef.current?.click()}
        />
      </div>

      <div className="action-panel">
        <button className="btn btn-print" onClick={() => setModal('share')}>🖨️ 인쇄 / PDF 저장</button>
        <button className="btn btn-soft" onClick={() => setModal('catalog')}>📋 카탈로그 관리</button>
      </div>

      {/* ── 모달 ── */}
      {modal === 'supplier' && (
        <SupplierModal supplier={supplier} onSave={handleSupplierSave} onClose={() => setModal(null)} />
      )}
      {modal === 'customer' && (
        <CustomerModal
          customer={customer} customers={customers}
          onApply={handleCustomerApply}
          onSaveToList={handleCustomerSaveToList}
          onDeleteFromList={handleCustomerDeleteFromList}
          onClose={() => setModal(null)}
        />
      )}
      {modal === 'catalog' && (
        <CatalogModal catalog={catalog} onDelete={handleCatalogDelete} onClose={() => setModal(null)} />
      )}
      {modal === 'share' && (
        <ShareModal onClose={() => setModal(null)} />
      )}
      {modal === 'json' && (
        <JsonModal onExport={handleExport} onClose={() => setModal(null)} importInputRef={importInputRef} />
      )}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
